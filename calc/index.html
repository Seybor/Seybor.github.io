<!DOCTYPE html>
<html lang='ru'>

<head>

	<meta charset="utf-8">

	<title>Calc v.0.2.0</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<link rel="manifest" href="manifest.json">

	<link rel="stylesheet" href="css/style.min.css">
</head>

<body>

	<div class="wrapper">
		<div class="calc">
			<div class="calc__logo">
				ASSISTANT AC-1111
			</div>
			<div class="calc__display">

			</div>
			<div class="calc-control">
				<div class="calc-control__keys" data-control="!">
				</div>
				<div class="calc-control__keys" data-control="√">

				</div>
				<div class="calc-control__keys" data-control="off">

				</div>
				<div class="calc-control__keys" data-control="on/c">

				</div>
				<div class="calc-control__keys" data-control="7">

				</div>
				<div class="calc-control__keys" data-control="8">

				</div>
				<div class="calc-control__keys" data-control="9">

				</div>
				<div class="calc-control__keys" data-control="/">

				</div>
				<div class="calc-control__keys" data-control="4">

				</div>
				<div class="calc-control__keys" data-control="5">

				</div>
				<div class="calc-control__keys" data-control="6">

				</div>
				<div class="calc-control__keys" data-control="*">

				</div>
				<div class="calc-control__keys" data-control="1">

				</div>
				<div class="calc-control__keys" data-control="2">

				</div>
				<div class="calc-control__keys" data-control="3">

				</div>
				<div class="calc-control__keys" data-control="-">

				</div>
				<div class="calc-control__keys" data-control="0">

				</div>
				<div class="calc-control__keys" data-control=".">

				</div>
				<div class="calc-control__keys" data-control="=">

				</div>
				<div class="calc-control__keys" data-control="+">

				</div>
			</div>
		</div>
	</div>

	<script src="js/main.js" type='module'></script>

</body>

</html>
