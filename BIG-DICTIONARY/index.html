<!DOCTYPE html>
<html id="html" data-bs-theme='dark'>

<head>

	<meta charset="utf-8">
	<!-- <base href="/"> -->

	<title>Simple Starter</title>
	<meta name="description" content="Simple Starter Description">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<meta property="og:image" content="img/preview.jpg">

	<link rel="stylesheet" href="libs/bootstrap/css/bootstrap.min.css">

	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/media.css">
</head>

<body>

	<div class="wrapper">
		<header class="header bg-body-secondary">
			<div class="container">

				<div class="header__inner">

					<div class="row align-items-center justify-content-evenly s-w-max">
						<div class="col">
							<label class="btn bg-success" for="fileInput">ChoiceFile</label>
							<input class="visually-hidden" type="file" id="fileInput" data-file="download" accept=".txt, .json">
						</div>
						<div class="col">
							<a href="#" class="btn bg-danger" id="link" download>Download</a>
						</div>

						<div class="dropdown col">
							<button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
								aria-expanded="false">
								Words
							</button>
							<ul class="dropdown-menu" id="words">
								<li><a class="dropdown-item" href="#" data-name="noun">Nouns</a></li>
								<li><a class="dropdown-item" href="#" data-name="r-verb">Regular-Verbs</a></li>
								<li><a class="dropdown-item" href="#" data-name="ir-verb">Irregular-Verbs</a></li>
								<li><a class="dropdown-item" href="#" data-name="adjective">Adjectives</a></li>
								<li><a href="#" class="dropdown-item" data-name="adverbs">Adverbs</a></li>
							</ul>
						</div>

						<div class="dropdown col" id="phrases">
							<button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
								aria-expanded="false">
								Phrases
							</button>
							<ul class="dropdown-menu">
								<li><a href="#" class="dropdown-item" data-name="phrases">Phrases</a></li>
								<li><a href="#" class="dropdown-item" data-name="phases-verbs">Phrases-verbs</a></li>
							</ul>
						</div>

					</div>

					<img class='s-theme' src="img/theme.png" alt="theme" id="theme">
				</div>



			</div>
		</header>

		<div class="main" id="main" data-current-arr>
			<div class="container text-center" id="field">

			</div>
		</div>

		<footer class="footer bg-body-secondary">
			<div class="container">
				<div class="footer__inner">
					<span>21.01.24</span>
				</div>
			</div>
		</footer>
	</div>


	<script src="libs/jquery/jquery.com_jquery-3.7.1.min.js" defer></script>
	<script src="libs/bootstrap/js/bootstrap.bundle.min.js" defer></script>

	<script type="module" src="js/main.js" defer></script>

</body>

</html>
