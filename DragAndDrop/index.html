<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		#responseField {
			border: 1px solid #929292;

			min-height: 50px;
			padding: 10px;
			text-align: left;
			margin-bottom: 1rem;
		}

		img {
			cursor: move;
			width: clamp(100px, 30vw, 300px);
			aspect-ratio: 1/1;
			object-fit: cover;
		}

		:where(.one, .two, .three) p {
			text-align: center;
		}

		/* .one {
			.one__title {
				color: red;
			}
		} */
		p {
			display: inline-block;
			padding: 6px;
			margin-right: 4px;

			color: black;
			border: 1px solid gray;
		}
	</style>
</head>

<body>

	<div id="question">

	</div>
	<div id="responseField" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
	<button id="btn-result">Проверить</button>
	<div id="items">

	</div>
	<template id="template">
		<p class="word-text" draggable="true" ondragstart="drag(event)" id="one">

		</p>
	</template>

	<script src="script.js"></script>
</body>

</html>
