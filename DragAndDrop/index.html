<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.trash {
			border: 1px solid #929292;
			background-image: url('trash.jpg');
			background-repeat: no-repeat;
			background-size: contain;
			background-position: center;

			min-height: 200px;
			padding: 10px;
			text-align: center;
			margin-bottom: 1rem;
		}

		img {
			cursor: move;
			width: clamp(100px, 30vw, 300px);
			aspect-ratio: 1/1;
			object-fit: cover;
		}

		:where(.one, .two, .three) p {
			text-align: center;
		}

		.one {
			.one__title {
				color: red;
			}
		}
	</style>
</head>

<body>

	<p>Переместите картинку в прямоугольник.</p>
	<div class="trash" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
	<img
		src="https://sun9-77.userapi.com/impg/-ImPonC5KLl8YuBq1ryQo-bWSAV6-IigbQuT0A/6GNiFhOEm6Y.jpg?size=1280x800&quality=95&sign=ebaa7739ab42639945195e7d80b78c15&type=album"
		draggable="true" alt="" ondragstart="drag(event)" id="photo1">
	<img
		src="https://sun4-22.userapi.com/impg/N1BjtYC-21YoZ9LAc_MItGLdBatBa04bKrttHQ/Al-ezxwhp70.jpg?size=819x1024&quality=96&sign=3a7b23f36c7299e2afcde300df75bd00&type=album"
		draggable="true" alt="" ondragstart="drag(event)" id="photo2">
	<img
		src="https://sun4-17.userapi.com/impf/fkldlrpdYySX_2CItJKO0J6vSJIvVMo50Rh8qA/ibGjepAExVs.jpg?size=363x543&quality=96&sign=bbd0b51d3f1a9b751fd6ae1d923bdd75&type=album"
		draggable="true" alt="" ondragstart="drag(event)" id="photo3">

	<img

		draggable="true" alt="" ondragstart="drag(event)" id="photo4">

		draggable="true" alt="" ondragstart="drag(event)" id="photo5">

	<script src="script.js"></script>
</body>

</html>
