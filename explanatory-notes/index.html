<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Фразовые глаголы</title>

	<link href="https://fonts.googleapis.com/css?family=Roboto:regular,700" rel="stylesheet" />
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<div class="wrapper">

		<header class="header" id="header">
			<div class="container">
				<div class="header__inner">
					<ul class="header__list">
						<li class="header__item" data-type="W">Words</li>
					</ul>

					<form class="header__search">
						<input class="header__search-input" type="text" placeholder="Поиск...">
						<button class="header__search-btn">Поиск</button>
					</form>
				</div>
			</div>
		</header>

		<main class="main">
			<div class="content">
				<div class="container">
					<div class="content__inner">

					</div>
				</div>
			</div>
		</main>


		<footer class="footer" id="footer">
			<div class="container">
				<div class="footer__inner">03.09.24</div>
			</div>
		</footer>

		<div class="progress"></div>

		<div class="buttons-wrapper buttons-wrapper--active">
			<a class="buttons-wrapper__link buttons-wrapper__link--up" href="#header">Up</a>
			<a class="buttons-wrapper__link buttons-wrapper__link--down" href="#footer">Down</a>
		</div>

	</div>

	<script src="js/script.js" type="module"></script>
</body>

</html>
