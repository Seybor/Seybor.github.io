<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tweny-one</title>

	<link rel="stylesheet" href="style.css">

	<script src="game.js" defer></script>
</head>

<body>
	<div class="wrapper">
		<div class="cash">
			<span>1000</span>$
		</div>
		<div class="start">
			<button class="btn start__btn" data-game="0">start game</button>
		</div>
		<div class="field">
			<div class="field__top">
				<div class="field__top-elements field__top-round"><span>1</span> round</div>
				<div class="field__top-elements field__top-points"><span>0</span> б</div>
				<div class="field__top-elements field__top-money"><span>50</span> $</div>
			</div>

			<div class="field__deck">0 0</div>

			<div class="field__bottom">
				<button class="btn field__bottom-stop">stop</button>
				<button class="btn field__bottom-take">take</button>
			</div>
		</div>
	</div>
</body>

</html>
