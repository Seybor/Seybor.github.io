<!DOCTYPE html>
<html lang='ru' data-theme="light">

<head>

	<meta charset="utf-8">
	<!-- <base href="/"> -->

	<title>Brick-game v0.4.0</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<link rel="manifest" href="manifest.json">

	<link rel="stylesheet" href="css/style.min.css">
</head>

<body>

	<div class="wrapper">

		<div class="container flex">
			<div class="content">
				<div class="content-display">
					<div class="content-display__field">

					</div>
					<div class="content-display__info">
						<div class="content-display__info-score">
							<span>Score</span>
							<span>0</span>
						</div>
						<div class="content-display__info-life">
							<span>Life</span>
							<span>4</span>
						</div>
						<div class="content-display__info-speed">
							<span>Speed</span>
							<span>1</span>
						</div>
					</div>
				</div>
				<div class="content-control">
					<div class="content-control__reset">
						<button class="btn btn--reset"></button>
					</div>
					<div class="content-control__buttons">
						<button class="btn btn--top"></button>
						<button class="btn btn--right"></button>
						<button class="btn btn--bottom"></button>
						<button class="btn btn--left"></button>
					</div>
					<div class="content-control__fire">
						<button class="btn btn--fire"></button>
					</div>
				</div>
			</div>
		</div>


	</div>




	</div>

	<script src="js/main.js" type='module'></script>

</body>

</html>
