<!DOCTYPE html>
<html lang='ru'>

<head>

	<meta charset="utf-8">
	<!-- <base href="/"> -->

	<title>Starter</title>
	<meta name="description" content="description">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<link rel="manifest" href="manifest.json">

	<link rel="stylesheet" href="css/style.min.css">
</head>

<body>

	<div class="wrapper">
		<header class="header">
			<div class="container">
				<div class="header__content">
					<a class="logo" href="index.html">
						<img class="logo__img" src="img/logo.png" alt="logo" width="50" height="50">
					</a>
				</div>
			</div>
		</header>

		<div class="main">

			<section class="contents">
				<div class="container">
					<form class="form-main" action="#" id="form-main">
						<textarea class="form-main__textarea no-resize" name="input" rows="10" placeholder="input"></textarea>

						<div class="form-main__filter">
							<div class="form-main__separators">
								<label class="form-main__label">
									Tab<input class="form-main__input" type="radio" name="separator" value="	" checked>
								</label>

								<label class="form-main__label">
									-<input class="form-main__input" type="radio" name="separator" value=" - ">
								</label>
							</div>

							<div class="form-main__anki">
								<label class="form-main__label">
									no<input class="form-main__input" type="radio" name="anki" value="false" checked>
								</label>

								<label class="form-main__label">
									yes<input class="form-main__input" type="radio" name="anki" value="true">
								</label>
							</div>

							<button class="btn form-main__btn" type="submit">Отправить</button>
						</div>

						<textarea class="form-main__textarea no-resize" name="output" rows="10" placeholder="output"
							readonly></textarea>
					</form>
				</div>
			</section>

		</div>

		<footer class="footer">
			<div class="container">
				<div class="footer__copy">
					&copy; by Seybor
				</div>
			</div>
		</footer>
	</div>



	<!-- <script src="libs/jquery/jquery.com_jquery-3.7.1.min.js" defer></script> -->

	<script src="js/main.js" defer></script>

</body>

</html>
