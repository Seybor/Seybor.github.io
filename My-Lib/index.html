<!DOCTYPE html>
<html>

<head>

	<meta charset="utf-8">
	<!-- <base href="/"> -->

	<title id="title">Test My lib</title>
	<meta name="description" content="Simple Starter Description">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<meta property="og:image" content="img/preview.jpg">

	<link rel="stylesheet" href="libs/bootstrap/css/bootstrap.min.css">

	<link rel="stylesheet" href="css/timer-theme.css">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/media.css">
</head>

<body>


	<div class="init-timer" id="init-timer">
		<span id="init-drag"></span>
		<h1 class="init-timer__time" id="timer">00:00:00</h1>
		<div class="init-timer__wrapper">
			<button class="init-timer__btn visually-hidden" id="continueBtn">||</button>
			<button class="init-timer__btn" id="startBtn">Старт</button>
			<button class="init-timer__btn" id="pauseBtn" disabled>Пауза</button>
			<button class="init-timer__btn" id="resetBtn" disabled>Сброс</button>
		</div>
	</div>

	<script src="libs/jquery/jquery.com_jquery-3.7.1.min.js" defer></script>
	<script src="libs/bootstrap/js/bootstrap.bundle.min.js" defer></script>

	<script type="module" src="js/main.js" defer></script>

</body>

</html>
