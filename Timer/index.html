<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .wrapper {
      margin: 0 auto;
      height: 100vh;
      width: 100%;
      max-width: 1200px;
      min-width: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    span {
      font-size: clamp(60px, 20vw, 320px);
      font-weight: 900;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="items">
      <span id="days">0</span>
      <span>:</span>
      <span id="hours">0</span>
      <span>:</span>
      <span id="minutes">0</span>
      <span>:</span>
      <span id="seconds">0</span>
    </div>
  </div>




  <script>
    let timeoutID;

    const time = () => {
      let sec = 0;
      let min = 0;
      let hour = 0;
      let day = 0;
      let message = () => {
        seconds.textContent = sec;
      };

      const timer = () => {
        clearInterval(timeoutID);
        timeoutID = setInterval(() => {
          sec++;
          if (sec === 60) {
            sec = 0;
            min++;
            minutes.textContent = min
          }
          if (min === 60) {
            min = 0;
            hour++;
            hours.textContent = hour
          }
          if (hour === 24) {
            hour = 0;
            day++;
            days.textContent = day
          }
          message();
        }, 1000);
      };

      timer();
    };

    time();
  </script>
</body>

</html>
