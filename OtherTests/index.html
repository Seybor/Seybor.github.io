<body>
	<div class="wrapper">

		<header class="header">
			<div class="container">
				<div class="header__inner">
					<nav class="menu header__menu">
						<ul class="menu__items">
							<li class="menu__item">
								<a class="menu__link" href="#math" data-item="math">Математический тест</a>
							</li>
							<li class="menu__item">

							</li>

				</div>
			</div>
		</header>

<main class="main">
	<section class="math tests" id="math">
		<div class="container">
			<div class="tests__inner">
				<h2 class="title tests__title visually-hidden">Математический тест</h2>
				<div class="tests__content">
					<form class="tests__form" action="#">
						<p class="tests__description">Даётся 1 минута. Наберите как можно больше баллов</p>
						<fieldset class="tests__fieldset">
							<legend class="tests__legend">Сложность</legend>
							<label class="tests__label">
								<input class="tests__difficult visually-hidden" value="1" name="difficult" type="radio" checked>
								<span data-difficult="easy">Easy</span>
							</label>
							<label class="tests__label">
								<input class="tests__difficult visually-hidden" value="2" name="difficult" type="radio">
								<span data-difficult="medium">Medium</span>
							</label>
							<label class="tests__label">
								<input class="tests__difficult visually-hidden" value="3" name="difficult" type="radio">
								<span data-difficult="hard">Hard</span>
							</label>
						</fieldset>
						<button class="tests__start">начать тест</button>
	
						<div class="tests__timer">
							Оставшееся время: <span></span>
						</div>
						<div class="tests__scores">
							Набранные баллы: <span>0</span>
						</div>
	
						<ul class="tests__items">
							<!-- - Для заданий -->
						</ul>
	
						<button class="tests__finish">проверить</button>
					</form>
				</div>
			</div>
		</div>
	</section>
	<section class="other tests" id="other">
		<div class="container">
			<div class="other__inner">
				<h2 class="title other__title"></h2>
				<div class="other__items">
					<div class="other__item">
						2
					</div>
				</div>
			</div>
		</div>
	</section>

	<template id="template-math">

		<li class="tests__item">

			<span class="tests__item-question"></span>

			<label class="tests__item-label">

				<input class="tests__item-input visually-hidden" type="radio" name="question" value="">

				<span></span>

			</label>

			<label class="tests__item-label">

				<input class="tests__item-input visually-hidden" type="radio" name="question" value="">

				<span></span>

			</label>

			<label class="tests__item-label">

				<input class="tests__item-input visually-hidden" type="radio" name="question" value="">

				<span></span>

			</label>

			<label class="tests__item-label">

				<input class="tests__item-input visually-hidden" type="radio" name="question" value="">

				<span></span>

			</label>

		</li>

	</template>
</main>
