<!DOCTYPE html>
<html lang='ru' data-theme="light">

<head>

	<meta charset="utf-8">
	<!-- <base href="/"> -->

	<title>Слоты</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<link rel="manifest" href="manifest.json">

	<link rel="stylesheet" href="css/style.min.css">
</head>

<body>

	<div class="wrapper">

		<div class="content">

			<div class="content-display">
				<div class="content-display__item content-display__item--one">
					<img src="img/1.png" alt="1">
				</div>
				<div class="content-display__item content-display__item--two">
					<img src="img/2.png" alt="2">
				</div>
				<div class="content-display__item content-display__item--three">
					<img src="img/3.png" alt="3">
				</div>
			</div>

			<div class="content-bank">1000</div>

			<div class="content-controls">

				<div class="content-controls__bet">

					<div class="content-controls__bet-item content-controls__bet-item--minus">-</div>
					<div class="content-controls__bet-item content-controls__bet-item--number">10</div>
					<div class="content-controls__bet-item content-controls__bet-item--plus">+</div>

				</div>

				<div class="content-controls__spin">spin</div>

			</div>

		</div>

	</div>

	</div>

	<script src="js/main.js" type='module'></script>

</body>

</html>
