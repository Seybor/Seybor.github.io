<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;

			max-width: 100%;
			overflow-wrap: break-word;
		}

		.wrapper {
			height: 100vh;
			min-height: 300px;
			padding: 12px;

			display: flex;
			flex-direction: column;
			gap: 20px;
			justify-content: center;
			align-items: center;

			border: 1px solid red;
		}

		.input {
			width: 200px;
			padding: 12px;
		}

		.find {
			display: block;

			padding: 6px;
		}

		.similar {
			padding: 12px 24px;
			border: 1px solid red;
		}

		.result {
			padding: 6px;
			border: 1px solid green;
		}
	</style>
</head>

<body>
	<div class="wrapper">
		<ul class="similar">

		</ul>
		<input class="input" type="text" placeholder="Введите текст">
		<button class="find">Найти</button>
		<span class="result">Результат</span>
	</div>


</body>

<script src="scripts/search.js"></script>

</html>
