<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		button {
  display: inline-block;
  padding: 20px;
  font-size: 30px;
  font-weight: 700;
}

.mistake {
  background-color: red;
}
.hell {
  background-color: black;
}

.paradise {
  background-color: green;
}
	</style>
</head>
<body>
	
<div id='doors'>
  <button id='btn-1'>1</button>
<button id='btn-2'>2</button>
<button id='btn-3'>3</button>
</div>

<script>
	let max = 3
let min = 1

let randomNumber = Math.floor(Math.random() * (max - min + 1) + min)
console.log(randomNumber)

let counter = 0;

doors.addEventListener('click', (evt) => {
  
  
  
    if(evt.target.id == 'doors') {
      return;
    }
  
    if(counter === 1) {
      
      if(+evt.target.textContent == randomNumber) {
        doors.querySelector(`#btn-${evt.target.textContent}`).classList.add('paradise')
        return
      } 
      if(+evt.target.textContent != randomNumber) {
        doors.querySelector(`#btn-${evt.target.textContent}`).classList.add('hell')
        return
      }  
  }
  
    let a = +evt.target.textContent
    console.log(a)
  
    let arr = [1, 2, 3]
    let mistake = []
    mistake.push(randomNumber)
 
    mistake.push(a)
  
  let uniqueNumbers = arr.filter(function(number) {
  return !mistake.includes(number);
  });
  
   console.log(uniqueNumbers)
    let rn = 0;
    if (uniqueNumbers.length === 2) {
      rn = Math.floor(Math.random() * (1 - 0 + 1) + 0)
    }
  
   doors.querySelector(`#btn-${uniqueNumbers[rn]}`).classList.add('mistake')
  
    counter++;
  
  
})

</script>
</body>
</html>
