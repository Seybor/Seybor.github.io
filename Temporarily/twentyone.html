let dil = 0

  if (check === true) {

  dil = dil + 10
} else if (ARR[dilerOne] == 'Т') {

} else {

}
    }
    
      
     
     if ( (dil > 21) ) {

} else if (ARR[randomOne] == 'Т') {

}
  
    if ( (ARR[dilerOne] == 'В') || (ARR[dilerOne] == 'Д') || (ARR[dilerOne] == 'К') ) {

   if (again === true) {

} else if (ARR[dilerTwo] == 'Т') {

     alert(`Счёт: ${ARR[randomOne]} и ${ARR[randomTwo]} = ${final} ; Счёт дилера: ${ARR[dilerOne]} и ${ARR[dilerTwo]} = ${dil}`)

 game(true, false)

while (ask && (final < 21) ) {

while ((final < 21) && (dil !== 100) ) {
