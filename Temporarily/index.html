<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;

			max-width: 100%;
			overflow-wrap: break-word;
		}

		.wrapper {
			height: 100vh;
			min-height: 300px;
			padding: 12px;

			display: flex;
			flex-direction: column;
			gap: 20px;
			justify-content: center;
			align-items: center;

			border: 1px solid red;
		}

		.input {
			width: 200px;
			padding: 12px;
		}

		.check {
			display: block;

			padding: 6px;
		}
	</style>
</head>

<body>
	<div class="wrapper">
		<input class="input" type="text" placeholder="Введите текст" maxlength="20">
		<button class="check">Зашифровать</button>
		<span class="code">Зашифрованное слово</span>
		<span class="number">Числовое представление</span>
		<span class="again">Проверка</span>
	</div>


</body>

<script src="main.js"></script>

</html>
