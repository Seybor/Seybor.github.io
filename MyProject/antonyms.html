<main class="main">
	<section class="antonyms">
		<div class="container">
			<div class="antonyms__inner">
				<h2 class="title antonyms__title">Антонимы</h2>
				<span class="result"></span>
				<form class="antonyms__form">
					<div class="antonyms__choose">
						Количество <br />
						<label class="antonyms__choose-label" id="label-5">
							<input class="antonyms__choice visually-hidden" type="radio" name="choice" value="5" checked />
							<span>5</span>
						</label>
						<label class="antonyms__choose-label" id="label-10">
							<input class="antonyms__choice visually-hidden" type="radio" name="choice" value="10" />

						</label>

						</label>

						</label>
						<label class="antonyms__choose-label" id="label-25">
							<input class="antonyms__choice visually-hidden" type="radio" name="choice" value="25" />
							<span>25</span>
						</label>

						<button class="antonyms__start" id="antonyms__start" type="button">Начать</button>
					</div>

					<ol class="antonyms__items">
						<!-- - Сюда вставляются задания -->
					</ol>

					<button class="antonyms__btn visually-hidden" id="antonyms__btn" type="button">Проверить</button>
				</form>
			</div>
		</div>
	</section>

	<template id="template-antonyms">
		<li class="antonyms__item">
			<span class="antonyms__span"></span>
			<span class="check"></span>
			<input class="antonyms__input" type="text" placeholder="ответ" required data-result />
