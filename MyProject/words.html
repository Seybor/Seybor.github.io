<main class="main">

	<section class="words">
		<div class="container">
			<div class="words__inner">
				<h2 class="title words__title">Слова А0 для самопроверки</h2>
				<span class="result"></span>
				<form class="words__form">
					<div class="words__choose">
						Количество<br />
						<label class="words__choose-label" id="label-5">
							<input class="words__choice visually-hidden" type="radio" name="choice" value="5" checked />
							<span>5</span>
						</label>
						<label class="words__choose-label" id="label-10">
							<input class="words__choice visually-hidden" type="radio" name="choice" value="10" />
							<span>10</span>
						</label>
						<label class="words__choose-label" id="label-15">
							<input class="words__choice visually-hidden" type="radio" name="choice" value="15" />
							<span>15</span>
						</label>
						<label class="words__choose-label" id="label-20">
							<input class="words__choice visually-hidden" type="radio" name="choice" value="20" />
							<span>20</span>
						</label>
						<label class="words__choose-label" id="label-25">
							<input class="words__choice visually-hidden" type="radio" name="choice" value="25" />
							<span>25</span>
						</label>

						<br> Вариант перевода <br />
						<label class="words__choose-label" id="label-en">
							<input class="words__languages visually-hidden" type="radio" name="languages" value="en" checked />
							<span>en</span>
						</label>
						<label class="words__choose-label" id="label-ru">
							<input class="words__languages visually-hidden" type="radio" name="languages" value="ru" />
							<span>ru</span>
						</label>
						<label class="words__choose-label" id="label-all">
							<input class="words__languages visually-hidden" type="radio" name="languages" value="all" />
							<span>ru/en</span>
						</label>
						<button class="words__start" id="words__start" type="button">Начать</button>
					</div>

					<ol class="words__items">
						<!-- - Сюда вставляются задания -->
					</ol>

					<button class="words__btn visually-hidden" id="words__btn" type="button">Проверить</button>
				</form>
			</div>
		</div>
	</section>

	<template id="template-words">
		<li class="words__item">
			<span class="words__guess"></span>
			<label class="words__label">
				<input class="words__input" type="radio" placeholder="word" name="" required checked data-result />
				<span></span>
			</label>
			<label class="words__label">
				<input class="words__input" type="radio" placeholder="word" name="" required data-result />
				<span></span>
			</label>
			<label class="words__label">
				<input class="words__input" type="radio" placeholder="word" name="" required data-result />
				<span></span>
			</label>
			<label class="words__label">
				<input class="words__input" type="radio" placeholder="word" name="" required data-result />
				<span></span>
			</label>
		</li>
	</template>
