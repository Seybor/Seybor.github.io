<main class="main">
  <section class="testing">
    <div class="container">
      <div class="testing__inner">
        <h2 class="title testing__title">Проверь себя!</h2>
        <span class="result"></span>
        <form class="testing__form">
          <div class="testing__choose">
            Укажите количество предложений для теста <br />
            <label class="testing__choose-label" id="label-5">
              <input class="testing__choice visually-hidden" type="radio" name="choice" value="5" checked />
              <span>5</span>
            </label>
            <label class="testing__choose-label" id="label-10">
              <input class="testing__choice visually-hidden" type="radio" name="choice" value="10" />
              <span>10</span>
            </label>
            <label class="testing__choose-label" id="label-15">
              <input class="testing__choice visually-hidden" type="radio" name="choice" value="15" />
              <span>15</span>
            </label>
            <label class="testing__choose-label" id="label-20">
              <input class="testing__choice visually-hidden" type="radio" name="choice" value="20" />
              <span>20</span>
            </label>
            <label class="testing__choose-label" id="label-25">
              <input class="testing__choice visually-hidden" type="radio" name="choice" value="25" />
              <span>25</span>
            </label>
  
            <br> Укажите вариант предложений <br />
            <label class="testing__choose-label" id="label-en">
              <input class="testing__languages visually-hidden" type="radio" name="languages" value="en" checked />
              <span>en</span>
            </label>
            <label class="testing__choose-label" id="label-ru">
              <input class="testing__languages visually-hidden" type="radio" name="languages" value="ru" />
              <span>ru</span>
            </label>
            <label class="testing__choose-label" id="label-all">
              <input class="testing__languages visually-hidden" type="radio" name="languages" value="all" />
              <span>ru/en</span>
            </label>
            <button class="testing__start" id="testing__start" type="button">Начать</button>
          </div>
  
          <ol class="testing__items">
            <!-- - Сюда вставляются задания -->
          </ol>
  
          <button class="testing__btn visually-hidden" id="testing__btn" type="button">Проверить</button>
        </form>
      </div>
    </div>
  </section>
  <template id="template-one">
    <li class="testing__item">
      <span class="testing__span">123</span>
      <span class="check"></span>
      <input class="testing__input" type="text" placeholder="answer*" required />
