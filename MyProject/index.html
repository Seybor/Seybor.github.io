      <div class="main">
        <section class="testing">
          <div class="container">
            <div class="testing__inner">
              <h2 class="title testing__title">Проверь себя!</h2>
              <span class="result"></span>
              <form class="testing__form">
                <div class="testing__choose">
                  Укажите количество <br />
                  <label class="testing__choose-label">
                    5
                    <input class="testing__choice" type="radio" name="choice" value="5" checked />
                  </label>
                  <label class="testing__choose-label">
                    10
                    <input class="testing__choice" type="radio" name="choice" value="10" />
                  </label>
                  <label class="testing__choose-label">
                    15
                    <input class="testing__choice" type="radio" name="choice" value="15" />
                  </label>
                  <button class="testing__start" id="testing__start" type="button">Начать</button>
                </div>

                <ol class="testing__items">
                  <!-- - Сюда вставляются задания -->
                </ol>

                <button class="testing__btn" id="testing__btn" type="button">Проверить</button>
              </form>
            </div>
          </div>
        </section>
      </div>

          <span class="testing__span">123</span>
