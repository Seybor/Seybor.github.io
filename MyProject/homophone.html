<main class="main">
	<section class="homophone">
		<div class="container">
			<div class="homophone__inner">
				<h2 class="title homophone__title">Омофоны</h2>
				<span class="result"></span>
				<form class="homophone__form">
					<div class="homophone__choose">
						Количество <br />
						<label class="homophone__choose-label">
							<input class="homophone__choice visually-hidden" type="radio" name="choice" value="2" checked />
							<span>2</span>
						</label>
						<label class="homophone__choose-label">
							<input class="homophone__choice visually-hidden" type="radio" name="choice" value="4" />
							<span>4</span>
						</label>
						<label class="homophone__choose-label">
							<input class="homophone__choice visually-hidden" type="radio" name="choice" value="6" />
							<span>6</span>
						</label>
						<label class="homophone__choose-label">
							<input class="homophone__choice visually-hidden" type="radio" name="choice" value="8" />
							<span>8</span>
						</label>
						<label class="homophone__choose-label">
							<input class="homophone__choice visually-hidden" type="radio" name="choice" value="10" />
							<span>10</span>
						</label>
						<button class="homophone__start" id="homophone__start" type="button">Начать</button>
					</div>

					<ol class="homophone__items">
						<!-- - Сюда вставляются задания -->
					</ol>

					<button class="homophone__btn visually-hidden" id="homophone__btn" type="button">Проверить</button>
				</form>
			</div>
		</div>
	</section>

	<template id="template-homophone">
		<li class="homophone__item">
			<span class="homophone__span"></span>
			<span class="check check--one"></span>
			<span class="check check--two"></span>
			<input class="homophone__input homophone__input--one" type="text" placeholder="слово 1" data-result />
			<input class="homophone__input homophone__input--two" type="text" placeholder="слово 2" data-result />
		</li>
	</template>
