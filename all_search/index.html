<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<!-- <base href="/"> -->
	<title>All search</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="favicon.ico">
	<link rel="manifest" href="manifest.json">

	<link href="https://fonts.googleapis.com/css?family=Ubuntu:regular,700" rel="stylesheet" />

	<link rel="stylesheet" href="css/style.min.css">
</head>

<body>

	<div class="wrapper">
		<header class="header">
			<div class="container">
				<div class="header__inner">
					<form class="search" action="#">
						<div class="search__inner">
							<button class="search__btn" type="button" id="toggle" data-name="🔴">Toggle</button>
							<input class="search__input" type="text" placeholder="search" required minlength="2" data-name="🟢">
							<button class="search__btn" type="submit" data-name="🔵">Search</button>
						</div>
					</form>
					<div class="clock-wrapper none">
						<div class="clock">
							<div class="hour">
								<div class="hours">

								</div>
							</div>

							<div class="minute">
								<div class="minutes">

								</div>
							</div>

							<div class="second">
								<div class="seconds">

								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</header>

		<div class="main">

			<div class="contents">
				<div class="container">
					<form class="form-main" action="#" id="form-main">
						<textarea class="form-main__textarea no-resize" name="input" rows="10" placeholder="input"></textarea>

						<div class="form-main__filter">
							<div class="form-main__radio">
								<label class="form-main__label">
									Tab<input class="form-main__input" type="radio" name="separator" value="	" checked>
								</label>

								<label class="form-main__label">
									-<input class="form-main__input" type="radio" name="separator" value=" - ">
								</label>
							</div>

							<div class="form-main__radio">
								<label class="form-main__label">
									no<input class="form-main__input" type="radio" name="anki" value="false" checked>
								</label>

								<label class="form-main__label">
									yes<input class="form-main__input" type="radio" name="anki" value="true">
								</label>
							</div>

							<button class="btn form-main__btn" type="submit">Отправить</button>
							<a class="btn form-main__link" href="#" style="display: none;">Download</a>
						</div>

						<textarea class="form-main__textarea no-resize" name="output" rows="10" placeholder="output"
							readonly></textarea>
					</form>
				</div>
			</div>

			<div class="elements">
				<div class="container">
					<div class="elements__inner">
						<div class="elements__items">
						</div>
					</div>
				</div>
			</div>

		</div>

		<footer class="footer">
			<div class="container">
				<div class="footer__inner">

					<div class="footer__time">
						17.02.24
					</div>

					<div class="change-font">
						<button class="btn change-font__plus" data-btn="plus">A+</button>
						<button class="btn change-font__minus" data-btn="minus">A-</button>
					</div>
				</div>

			</div>
		</footer>
	</div>

	<script src="js/main.js" type="module"></script>
</body>

</html>
