<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<!-- <base href="/"> -->
	<title>All search</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="favicon.ico">
	<link rel="manifest" href="manifest.json">

	<link href="https://fonts.googleapis.com/css?family=Ubuntu:regular,700" rel="stylesheet" />

	<link rel="stylesheet" href="css/seybor-style/seybor-reset.css">
	<link rel="stylesheet" href="css/seybor-style/seybor-style.css">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<div class="wrapper">
		<header class="header">
			<div class="container">
				<div class="header__inner">
					<form class="search" action="#">
						<div class="search__inner">
							<input class="search__input" type="text" placeholder="search" required minlength="2">
							<button class="search__btn" type="submit">Search</button>
						</div>
					</form>
				</div>
			</div>
		</header>

		<div class="main">

			<div class="elemets">
				<div class="container">
					<div class="elements__inner">
						<div class="elements__items">
							<div class="clock-wrapper">
								<div class="clock">
									<div class="hour">
										<div class="hours">

										</div>
									</div>

									<div class="minute">
										<div class="minutes">

										</div>
									</div>

									<div class="second">
										<div class="seconds">

										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

		</div>

		<footer class="footer">
			<div class="container">
				<div class="footer__inner">
					17.02.24
				</div>
			</div>
		</footer>
	</div>

	<script src="js/clock.js" defer></script>
	<script src="js/main.js" defer></script>
</body>

</html>
