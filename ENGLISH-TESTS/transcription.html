<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <nav class="menu header__menu">
            <ul class="menu__items">
              <li class="menu__item">

        </div>
      </div>
    </header>
<main class="main">

	<section class="transcription">
		<div class="container">
			<div class="transcription__inner">
				<h2 class="title transcription__title">Транскрипция слов А0 для самопроверки</h2>
				<span class="result"></span>
				<form class="transcription__form">
					<div class="transcription__choose">
						Количество<br />
						<label class="transcription__choose-label" id="label-5">
							<input class="transcription__choice visually-hidden" type="radio" name="choice" value="5" checked />
							<span>5</span>
						</label>
						<label class="transcription__choose-label" id="label-10">
							<input class="transcription__choice visually-hidden" type="radio" name="choice" value="10" />
							<span>10</span>
						</label>
						<label class="transcription__choose-label" id="label-15">
							<input class="transcription__choice visually-hidden" type="radio" name="choice" value="15" />
							<span>15</span>
						</label>
						<label class="transcription__choose-label" id="label-20">
							<input class="transcription__choice visually-hidden" type="radio" name="choice" value="20" />
							<span>20</span>
						</label>
						<label class="transcription__choose-label" id="label-25">
							<input class="transcription__choice visually-hidden" type="radio" name="choice" value="25" />
							<span>25</span>
						</label>
						<button class="transcription__start" id="transcription__start" type="button">Начать</button>
					</div>

					<ol class="transcription__items">
						<!-- - Сюда вставляются задания -->
					</ol>

					<button class="transcription__btn visually-hidden" id="transcription__btn" type="button">Проверить</button>
				</form>
			</div>
		</div>
	</section>

	<template id="template-transcription">
		<li class="transcription__item">
			<span class="transcription__span"></span>
			<span class="check"></span>
			<input class="transcription__input" type="text" placeholder="ответ" data-result />
		</li>
	</template>

</main>
<footer class="footer">
	<div class="container">
		<div class="footer__inner">

		</div>
	</div>
</footer>
</div>

<script src="js/main.js"></script>
