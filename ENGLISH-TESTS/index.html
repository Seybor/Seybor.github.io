<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="my site" />
  <meta name="keywords" content="test, hello" />
  <meta name="Author" content="Seybor" />
  <meta name="Copyright" content="Seybor" />
  <meta name="Address" content="Planet Earth" />
  <meta name="application-name" content="My Project" />

  <title>Тесты по английскому</title>
  <link href="https://fonts.googleapis.com/css?family=Ubuntu:300,700" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.min.css" />
</head>

</html>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <nav class="menu header__menu">
            <ul class="menu__items">
              <li class="menu__item">
                <a class="menu__link" href="index.html" data-current>Offers(A0)</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="offers1.html" data-current>Offers(A1)</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="transcription.html" data-current>Transcription</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

<main class="main">
  <section class="offers">
    <div class="container">
      <div class="offers__inner">
        <h2 class="title offers__title">Предложения А0 для самопроверки</h2>
        <span class="result"></span>
        <form class="offers__form">
          <div class="offers__choose">

            <br>Количество <br />
            <label class="offers__choose-label" id="label-5">
              <input class="offers__choice visually-hidden" type="radio" name="choice" value="5" checked />
              <span>5</span>
            </label>
            <label class="offers__choose-label" id="label-10">
              <input class="offers__choice visually-hidden" type="radio" name="choice" value="10" />
              <span>10</span>
            </label>
            <label class="offers__choose-label" id="label-15">
              <input class="offers__choice visually-hidden" type="radio" name="choice" value="15" />
              <span>15</span>
            </label>

            <br> Вариант перевода <br />
            <label class="offers__choose-label" id="label-en">
              <input class="offers__languages visually-hidden" type="radio" name="languages" value="en" checked />
              <span>en</span>
            </label>
            <label class="offers__choose-label" id="label-ru">
              <input class="offers__languages visually-hidden" type="radio" name="languages" value="ru" />
              <span>ru</span>
            </label>
            <label class="offers__choose-label" id="label-all">
              <input class="offers__languages visually-hidden" type="radio" name="languages" value="all" />
              <span>ru/en</span>
            </label>
            <button class="offers__start" id="offers__start" type="button">Начать</button>
          </div>

          <div class="offers__content-container content-container" style="display: none;">
            <div class="offers__question">
              <!-- - Сюда вставляется вопрос -->
              Вопрос
            </div>
            <div class="offers__right-answer">
              <!-- - Текст правильного ответа в случае ошибки -->
              Ответ в случае ошибки
            </div>
            <div class="offers__responsefield" id="responsefield">
              <!-- - Поле для текста -->
              Поле для текста
            </div>

            <div class="content-container__bottom-wrapper">
              <div class="offers__answer-arr" id="answers">
                <!-- - Слова для ответа -->
                Слова для ответа
              </div>

              <button class="offers__btn offers__btn--check visually-hidden" id="offers__btn-check"
                type="button">Проверить</button>
              <button class="offers__btn offers__btn--next visually-hidden" id="offers__btn-next"
                type="button">Дальше</button>
            </div>

          </div>

          <div class="offers__results" style="display: none;">
            <div class="offers__score">
              <!-- - Баллы -->
              Набранные баллы: <span id="offers__score-value">0</span> из <span id="offers__score-total">0</span>
            </div>

            <button class="offers__btn offers__btn--again" id="offers__btn-again" type="button">Попробовать
              снова</button>
          </div>

        </form>
      </div>
    </div>
  </section>


  <template id="template-offers">
    <p class="offers__word" id="one">

    </p>
  </template>

</main>

<footer class="footer">

	<div class="container">

		<div class="footer__inner">



		</div>

	</div>

</footer>
</div>

<script src="js/main.js"></script>

</body>

</html>
