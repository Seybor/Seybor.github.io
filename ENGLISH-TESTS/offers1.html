</head>

</html>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <nav class="menu header__menu">
            <ul class="menu__items">
              <li class="menu__item">
                <a class="menu__link" href="index.html" data-current>Offers(A0)</a>

              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

<main class="main">
	<section class="offers1">
		<div class="container">
			<div class="offers1__inner">
				<h2 class="title offers1__title">Предложения А1 для самопроверки</h2>
				<span class="result"></span>
				<form class="offers1__form">
					<div class="offers1__choose">

						Уроки <br>
						<label class="offers1__choose-label" id="lesson-1">
							<input class="offers1__lessons visually-hidden" type="radio" name="lessons" value="1" checked />
							<span>51-57</span>
						</label>
						<label class="offers1__choose-label" id="lesson-2">
							<input class="offers1__lessons visually-hidden" type="radio" name="lessons" value="2" />
							<span>58-62</span>
						</label>
						<label class="offers1__choose-label" id="lesson-3">
							<input class="offers1__lessons visually-hidden" type="radio" name="lessons" value="3" />
							<span>63-71</span>
						</label>

						<br>Количество <br />
						<label class="offers1__choose-label" id="label-5">
							<input class="offers1__choice visually-hidden" type="radio" name="choice" value="5" checked />
							<span>5</span>
						</label>
						<label class="offers1__choose-label" id="label-10">
							<input class="offers1__choice visually-hidden" type="radio" name="choice" value="10" />
							<span>10</span>
						</label>
						<label class="offers1__choose-label" id="label-15">
							<input class="offers1__choice visually-hidden" type="radio" name="choice" value="15" />
							<span>15</span>
						</label>

						<br> Вариант перевода <br />
						<label class="offers1__choose-label" id="label-en">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="en" checked />
							<span>en</span>
						</label>
						<label class="offers1__choose-label" id="label-ru">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="ru" />
							<span>ru</span>
						</label>
						<label class="offers1__choose-label" id="label-all">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="all" />
							<span>ru/en</span>
						</label>
						<label class="offers1__choose-label" id="label-all">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="tr-en" />
							<span>tr-en*</span>
						</label>
						<label class="offers1__choose-label" id="label-all">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="en-tr" />
							<span>en-tr*</span>
						</label>
						<label class="offers1__choose-label" id="label-all">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="tr-ru" />
							<span>tr-ru*</span>
						</label>
						<label class="offers1__choose-label" id="label-all">
							<input class="offers1__languages visually-hidden" type="radio" name="languages" value="ru-tr" />
							<span>ru-tr*</span>
						</label>
						<button class="offers1__start" id="offers1__start" type="button">Начать</button>
					</div>

					<div class="offers1__content-container content-container" style="display: none;">
						<div class="offers1__question">
							<!-- - Сюда вставляется вопрос -->
							Вопрос
						</div>
						<div class="offers1__right-answer">
							<!-- - Текст правильного ответа в случае ошибки -->
							Ответ в случае ошибки
						</div>
						<div class="offers1__responsefield" id="responsefield">
							<!-- - Поле для текста -->
							Поле для текста
						</div>

						<div class="content-container__bottom-wrapper">
							<div class="offers1__answer-arr" id="answers">
								<!-- - Слова для ответа -->
								Слова для ответа
							</div>

							<button class="offers1__btn offers1__btn--check visually-hidden" id="offers1__btn-check"
								type="button">Проверить</button>
							<button class="offers1__btn offers1__btn--next visually-hidden" id="offers1__btn-next"
								type="button">Дальше</button>
						</div>

					</div>

					<div class="offers1__results" style="display: none;">
						<div class="offers1__score">
							<!-- - Баллы -->
							Набранные баллы: <span id="offers1__score-value">0</span> из <span id="offers1__score-total">0</span>
						</div>

						<button class="offers1__btn offers1__btn--again" id="offers1__btn-again" type="button">Попробовать
							снова</button>
					</div>

				</form>
			</div>
		</div>
	</section>


	<template id="template-offers__one">
		<p class="offers1__word" id="one">

		</p>
	</template>

</main>

<footer class="footer">

	<div class="container">

		<div class="footer__inner">



		</div>

	</div>

</footer>
</div>

<script src="js/main.js"></script>

</body>

</html>
