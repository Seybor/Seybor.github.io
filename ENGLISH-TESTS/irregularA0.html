<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />

  <meta name="Address" content="Planet Earth" />
  <meta name="application-name" content="My Project" />

  <title>Тесты по английскому</title>
  <link href="https://fonts.googleapis.com/css?family=Ubuntu:300,700" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.min.css" />
</head>

</html>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <nav class="menu header__menu">
            <ul class="menu__items">
              <li class="menu__item">
                <a class="menu__link" href="index.html" data-current>Offers(A0)</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="offers1.html" data-current>Offers(A1)</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="transcription.html" data-current>Transcription</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="irregularA0.html" data-current>irregular(A0)</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="words.html" data-current>Words</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

<main class="main">
	<section class="irregular-a0">
		<div class="container">
			<div class="irregular-a0__inner">

				<h2 class="title irregular-a0__title">Неправильные глаголы А0</h2>

				<div class="labels">
					<div class="labels__item">
						<p class="labels__text">Количество</p>
						<label class="labels__label" id="label-5">
							<input class="input visually-hidden" type="radio" name="choice" value="5" checked />
							<span>5</span>
						</label>
						<label class="labels__label" id="label-10">
							<input class="input visually-hidden" type="radio" name="choice" value="10" />
							<span>10</span>
						</label>
						<label class="labels__label" id="label-15">
							<input class="input visually-hidden" type="radio" name="choice" value="15" />
							<span>15</span>
						</label>
					</div>

					<div class="labels__item">
						<p class="labels__text">Вариант вопроса</p>
						<label class="labels__label" id="label-v1">
							<input class="input visually-hidden" type="radio" name="option" value="v1" checked />
							<span>V1</span>
						</label>
						<label class="labels__label" id="label-v2">
							<input class="input visually-hidden" type="radio" name="option" value="v2" />
							<span>V2</span>
						</label>
						<label class="labels__label" id="label-v2">
							<input class="input visually-hidden" type="radio" name="option" value="v3" disabled />
							<span>V3</span>
						</label>
					</div>

					<button class="start btn" id="start" type="button">
						Начать
					</button>
				</div>

				<form class="questions" style="display: none;">
					<ul class="field" data-type>
						<!-- - Поле для вопросов -->
					</ul>

					<button class="result btn btn--result" id="result" type="submit">
						Проверить
					</button>

					<button class="fill btn btn--fill" id="fill" type="button">
						Заполнить
					</button>

					<div class="mark" style="display: none;">
						<div class="">
							<!-- - Баллы -->
							Набранные баллы: <span id="mark__min">0</span> из <span id="mark__max">0</span>
						</div>

						<button class="again btn btn--again" id="again" type="button">
							Попробовать снова
						</button>
					</div>
				</form>

			</div>

		</div>
	</section>


	<template id="template-irregular__A0">
		<li class="field__element" id="el">
			<input class="field__input" type="text" placeholder="answer" maxlength="20" required data-results>
			<span class="field__question"></span>
		</li>
	</template>

</main>

<footer class="footer">

	<div class="container">

		<div class="footer__inner">



		</div>

	</div>

</footer>
</div>

<script src="js/main.js"></script>

</body>

</html>
