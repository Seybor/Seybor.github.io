<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tic-toe</title>

	<link rel="stylesheet" href="style.css">


	<script src="minimax.js" defer></script>
</head>

<body>
	<div class="wrapper">
		<div class="field">
			<div class="cell" data-cell="0" data-player="0"></div>
			<div class="cell" data-cell="1" data-player="0"></div>
			<div class="cell" data-cell="2" data-player="0"></div>
			<div class="cell" data-cell="3" data-player="0"></div>
			<div class="cell" data-cell="4" data-player="0"></div>
			<div class="cell" data-cell="5" data-player="0"></div>
			<div class="cell" data-cell="6" data-player="0"></div>
			<div class="cell" data-cell="7" data-player="0"></div>
			<div class="cell" data-cell="8" data-player="0"></div>
		</div>
	</div>
</body>

</html>
