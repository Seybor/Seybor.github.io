<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki</title>
  <link href="css/styles.min.css" rel="stylesheet">
</head>

<body>

  <div class="wrapper flex-centering">
    <div class="container flex-centering">
      <div class="card">
        <div class="front flex-centering">
          <p>
            bark
          </p>
          <div class="divider"></div>
          <p>
            Look! The dog is barking
          </p>
        </div>
        <div class="back flex-centering">
          <p>
            лаять
          </p>
          <div class="divider"></div>
          <p>
            Смотрите! Собака лает
          </p>
        </div>
      </div>
      <div class="buttons">
        <button class="btn btn--prev" data-value="prev">prev</button>
        <button class="btn btn--answer" data-value="answer">answer</button>
        <button class="btn btn--next" data-value="next">next</button>
      </div>
    </div>


  </div>

  <script src="js/main.js" type="module"></script>
</body>

</html>
