<!DOCTYPE html>
<html lang='ru' data-theme="light">

<head>

	<meta charset="utf-8">
	<!-- <base href="/"> -->

	<title>Змейка</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="img/favicon.png">
	<link rel="manifest" href="manifest.json">

	<link rel="stylesheet" href="css/style.min.css">
</head>

<body>

	<div class="wrapper">

		<div class="content">

			<form>
				Размер поля <br>
				<label>
					5x5 <input type="radio" name="field" value="25">
				</label>
				<br>
				<label>
					10x10 <input type="radio" name="field" value="100">
				</label>
				<br>
				<label>
					20x20 <input type="radio" name="field" value="400" checked>
				</label>
				<br>

				Скорость игры <br>
				<label>
					0x <input type="radio" name="speed" value="0">
				</label>
				<br>
				<label>
					0.5x <input type="radio" name="speed" value="1000">
				</label>
				<br>
				<label>
					1x <input type="radio" name="speed" value="500" checked>
				</label>
				<br>
				<label>
					2x <input type="radio" name="speed" value="250">
				</label>
				<br>

				<hr>
				<button type="submit">ok</button>
			</form>

		</div>




	</div>




	</div>

	<!-- <script src=" libs/jquery.com_jquery-3.7.1.min.js" defer>
			</script> -->

	<script src="js/main.js" type='module'></script>

</body>

</html>
